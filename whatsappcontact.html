<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat | VarBro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #contact {
            padding-top: 80px;
        }

        .contact-wrapper {
            grid-template-columns: 1fr;
        }

        .contact-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 28px;
        }

        .photo-text-wrapper {
            margin-bottom: 0;
            flex: 1;
        }

        .direct-contact {
            flex-direction: row;
            justify-content: flex-end;
            flex-wrap: wrap;
            margin-top: 0;
            width: auto;
            flex-shrink: 0;
            margin-left: auto;
        }

        .direct-contact .btn-contact {
            width: auto;
            margin: 0;
            min-width: 220px;
        }

        .direct-contact .btn-email {
            border: none;
            background: transparent;
            box-shadow: none;
            text-decoration: none;
            color: #2f2f2f !important;
            min-width: auto;
            padding-left: 8px;
            padding-right: 8px;
        }

        .direct-contact .btn-email .back-label {
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .direct-contact .btn-email:hover {
            border: none;
            background: transparent;
            box-shadow: none;
            transform: none;
            color: #6c5ce7 !important;
        }

        .direct-contact .btn-email:hover .back-label {
            text-decoration-thickness: 2px;
            text-decoration-color: #6c5ce7;
        }

        @media (max-width: 980px) {
            .contact-info {
                flex-direction: column;
                align-items: stretch;
            }

            .direct-contact {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<section id="contact" class="section">
    <div class="container">
        <h2>Kapcsolat</h2>
        <p class="section-subtitle">Keltsük életre az ötletedet! Írj WhatsApp-on és 24 órán belül felveszem veled a kapcsolatot egy ingyenes konzultació érdekében.</p>
        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="photo-text-wrapper">
                    <div class="profile-photo">
                        <img src="myfoto.jpg" alt="VarBro">
                    </div>
                    <p>Készen áll a közös munkára? Keressen bizalommal!</p>
                </div>
                <div class="direct-contact">
                    <a href="https://wa.me/36307840378" class="btn-contact btn-whatsapp" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp-on irj</a>
                    <a href="index.html" class="btn-contact btn-email"><i class="fas fa-arrow-left"></i> <span class="back-label">Vissza a főoldalra</span></a>
                </div>
            </div>
        </div>
    </div>
</section>

<div id="thankYouModal" class="modal">
    <div class="modal-content">
        <i class="fas fa-check-circle"></i>
        <h2>Koszonjuk!</h2>
        <p>Uzenetet sikeresen megkaptuk. Hamarosan jelentkezunk!</p>
        <button onclick="closeModal()" class="btn-main">Bezaras</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
