<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajánlatkérés | VarBro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #0f0c29; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <div style="background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 500px;">
        <a href="index.html" style="display:inline-block; margin-bottom:20px; color:#6c5ce7; text-decoration:none; font-weight:bold;">← Vissza</a>
        <h2 style="margin-bottom: 20px;">Kérjen ajánlatot</h2>
        <form action="https://formspree.io/f/ВАШ_ID" method="POST" class="contact-form">
            <input type="text" name="name" placeholder="Név" required style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px;">
            <input type="email" name="email" placeholder="Email" required style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px;">
            <textarea name="message" rows="5" placeholder="Üzenet" required style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px;"></textarea>
            <button type="submit" class="btn-main">Küldés</button>
        </form>
    </div>
</body>
</html>
